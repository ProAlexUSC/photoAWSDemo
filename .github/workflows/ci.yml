name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: photo_pipeline
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-packages --dev --frozen

      - name: Pyright type check
        run: uv run pyright

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://dev:dev@localhost:5433/photo_pipeline
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          LOCAL_DEV: "true"
        run: |
          uv run dbmate -d ./migrations up
          uv run pytest tests/ -v
