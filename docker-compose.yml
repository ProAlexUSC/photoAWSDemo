services:
  ministack:
    build:
      context: .
      dockerfile: docker/ministack.Dockerfile
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: photo_pipeline
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev

  worker:
    image: photo-worker:latest
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment:
      # APP_ENV=local → Worker span metadata / trace tag 区分本地 vs AWS Batch
      - APP_ENV=local
      - S3_BUCKET=photo-uploads
      - DATABASE_URL=postgresql://dev:dev@postgres:5432/photo_pipeline
      - AWS_ENDPOINT_URL=http://ministack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      # Langfuse：密钥从主机 .env 透传；TRACE_ID / PARENT_OBS_ID 由 test_e2e.py -e 传入
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-}
    depends_on:
      - postgres
      - ministack
    profiles:
      - e2e
